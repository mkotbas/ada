<div id="calisma-takvimi-wrapper">
    <div id="admin-goal-config" class="calendar-config-card">
        <div class="config-content-wrapper">
            <div class="config-text-zone">
                <div class="config-title">
                    <i class="fas fa-bullseye"></i>
                    <span>Denetim Planlama Ayarları</span>
                </div>
                <p class="config-info">
                    Sistem, belirlediğiniz minimum günlük kotayı doldurmadan diğer günlere geçiş yapmaz.
                </p>
            </div>

            <div class="config-action-zone">
                <div class="input-group-cal">
                    <div class="admin-field-group">
                        <label>Min. Günlük</label>
                        <input type="number" id="global-min-daily-input" name="global-min-daily-input" placeholder="Min" min="0" max="10">
                    </div>
                    <div class="admin-field-group">
                        <label>Aylık Hedef</label>
                        <input type="number" id="global-target-input" name="global-target-input" placeholder="Hedef" min="1">
                    </div>
                    <button id="btn-save-global-target" class="btn-save-cal">
                        <i class="fas fa-sync-alt"></i> Güncelle
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="calendar-legend-card" aria-label="Takvim renk açıklamaları">
        <div class="calendar-legend-toolbar">
            <div class="calendar-legend-row">
                <div class="calendar-legend-title">
                    <i class="fas fa-palette"></i>
                    <span>Renkler:</span>
                </div>
                <div class="calendar-legend-grid">
                    <div class="calendar-legend-item"><span class="legend-swatch legend-leave"></span><span>İzinli gün</span></div>
                    <div class="calendar-legend-item"><span class="legend-swatch legend-unprocessed"></span><span>İşlem görmemiş gün</span></div>
                    <div class="calendar-legend-item"><span class="legend-swatch legend-one"></span><span>1 planlı</span></div>
                    <div class="calendar-legend-item"><span class="legend-swatch legend-two"></span><span>2 planlı</span></div>
                    <div class="calendar-legend-item"><span class="legend-swatch legend-three"></span><span>3 planlı</span></div>
                    <div class="calendar-legend-item"><span class="legend-swatch legend-four"></span><span>4+ planlı</span></div>
                    <div class="calendar-legend-item"><span class="legend-swatch legend-completed"></span><span>Denetim yapılmış</span></div>
                    <div class="calendar-legend-item"><span class="legend-swatch legend-manual"></span><span>Manuel giriş</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="calisma-takvimi-consistency-warning" class="consistency-warning-banner" hidden role="alert" aria-live="polite"></div>

    <div class="calendar-grid-main"></div>
</div>
